<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Global Casting AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: #18181b; border: 1px solid #27272a; border-radius: 24px; padding: 32px; }
        .accent-blue { color: #3b82f6; }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: 0.3s; }
        .btn-gradient:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <h1 class="text-3xl font-black italic tracking-tighter">CASTING<span class="accent-blue">.AI</span> PRO</h1>
            <div class="flex gap-4 w-full md:w-auto">
                <input id="targetName" type="text" placeholder="셀럽 이름을 입력하세요" class="bg-zinc-900 border border-zinc-800 p-4 rounded-2xl w-full md:w-72 outline-none focus:border-blue-500">
                <button onclick="run()" class="btn-gradient px-10 py-4 rounded-2xl font-black whitespace-nowrap">분석 실행</button>
            </div>
        </header>

        <div id="result" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass lg:col-span-1">
                <p class="text-xs font-bold text-zinc-500 uppercase tracking-widest mb-2">Talent Identity</p>
                <h2 id="resName" class="text-5xl font-black mb-10">--</h2>
                <div class="p-6 bg-blue-600/10 rounded-3xl mb-10 border border-blue-500/20">
                    <p class="text-blue-400 text-xs font-bold mb-2 uppercase">Brand Fit Score</p>
                    <p id="resScore" class="text-7xl font-black">0</p>
                </div>
                <a id="ig" target="_blank" class="block w-full text-center p-4 bg-zinc-800 rounded-2xl font-bold hover:bg-zinc-700 transition-all">📱 실시간 SNS 반응 확인</a>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="glass border-l-4 border-l-blue-500">
                    <h3 class="text-xs font-bold text-blue-500 mb-4 uppercase tracking-widest">Executive Summary</h3>
                    <p id="resSummary" class="text-xl font-bold leading-relaxed">데이터 수집 중...</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass">
                        <h4 class="font-bold mb-6 text-zinc-500 flex items-center gap-2">🎬 FILMOGRAPHY</h4>
                        <ul id="filmo" class="space-y-3 text-sm text-zinc-300"></ul>
                    </div>
                    <div class="glass">
                        <h4 class="font-bold mb-6 text-zinc-500 flex items-center gap-2">💎 AD / BRAND</h4>
                        <ul id="ads" class="space-y-3 text-sm text-zinc-300"></ul>
                    </div>
                </div>
                <div class="glass">
                    <h4 class="font-bold mb-6 text-zinc-500 flex items-center gap-2">📰 RECENT NEWS REFERENCE</h4>
                    <ul id="news" class="space-y-4"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function run() {
            const name = document.getElementById('targetName').value;
            if(!name) return;
            const btn = document.querySelector('button');
            btn.innerText = "분석 중...";
            try {
                const res = await fetch(`http://localhost:8000/analyze?name=${encodeURIComponent(name)}`);
                const data = await res.json();
                
                document.getElementById('resName').innerText = data.name;
                document.getElementById('resScore').innerText = data.score;
                document.getElementById('resSummary').innerText = data.summary;
                document.getElementById('ig').href = data.links.ig;
                
                document.getElementById('filmo').innerHTML = data.filmo.map(f => `<li class="border-b border-zinc-800/50 pb-2">▪ ${f}</li>`).join('');
                document.getElementById('ads').innerHTML = data.ads.map(a => `<li class="border-b border-zinc-800/50 pb-2">▪ ${a}</li>`).join('');
                document.getElementById('news').innerHTML = data.news.map(n => `<li><a href="${n.link}" target="_blank" class="hover:text-blue-400 block p-2 rounded-lg hover:bg-white/5 transition-all">→ ${n.title}</a></li>`).join('');
                
                document.getElementById('result').classList.remove('hidden');
            } catch(e) { alert("서버가 켜져 있는지 확인해 주세요!"); }
            finally { btn.innerText = "분석 실행"; }
        }
    </script>
</body>
</html>
